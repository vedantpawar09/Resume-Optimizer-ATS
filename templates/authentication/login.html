{% extends "base.html" %}
{% block title %}Log in - AI Resume Optimizer Pro{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:90vh;">
  <div class="glass-card p-5" style="max-width:420px; width:100%;">
    <h3 class="display-font mb-1 gradient-text">Welcome back</h3>
    <p class="text-secondary mb-4">Log in to continue optimizing your resume.</p>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">{{ form.username }}</div>
      <div class="mb-3">{{ form.password }}</div>
      <button type="submit" class="btn gradient-btn w-100">Log in</button>
    </form>
    <p class="text-secondary small mt-3 mb-0">No account? <a class="gradient-text" href="{% url 'authentication:register' %}">Sign up free</a></p>
  </div>
</div>
{% endblock %}
